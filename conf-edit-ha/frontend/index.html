<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuration Editor</title>
  <link rel="stylesheet" href="./styles.css">
  <script>
    // Apply theme immediately to prevent flicker
    (function() {
      const STORAGE_KEY = 'ha-editor-theme';
      let isDark = false;
      try {
        const storedTheme = localStorage.getItem(STORAGE_KEY);
        if (storedTheme === 'dark') {
          isDark = true;
        } else if (storedTheme === 'light') {
          isDark = false;
        } else if (storedTheme === 'auto' || !storedTheme) {
          isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        }
      } catch (e) {
        isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      }
      if (isDark) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>
<body autocorrect="off" autocapitalize="off" autocomplete="off" spellcheck="false">
  <div id="app">
    <!-- Header -->
     <header class="header">
       <div class="header-left">
         <div id="mobile-menu-toggle" class="mobile-menu-toggle" title="Menu" aria-label="Menu" aria-expanded="false" tabindex="-1" role="button">
           <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
             <path d="M12,16A2,2 0 0,1 14,18A2,2 0 0,1 12,20A2,2 0 0,1 10,18A2,2 0 0,1 12,16M12,10A2,2 0 0,1 14,12A2,2 0 0,1 12,14A2,2 0 0,1 10,12A2,2 0 0,1 12,10M12,4A2,2 0 0,1 14,6A2,2 0 0,1 12,8A2,2 0 0,1 10,6A2,2 0 0,1 12,4Z"/>
           </svg>
         </div>
         <h1>Configuration Editor</h1>
         <span class="filename" id="current-filename" aria-label="Current file">No file selected</span>
       </div>
       <div class="header-right">
          <div id="theme-toggle-btn" class="btn btn-secondary btn-icon-only" title="Change theme" aria-label="Change theme" aria-pressed="false" tabindex="-1" role="button">
            <svg id="theme-icon-auto-header" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M21 2H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h7l-2 3v1h8v-1l-2-3h7c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 12H3V4h18v10z"/>
            </svg>
            <svg id="theme-icon-light-header" width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <path d="M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm0 1a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/>
              <path d="M8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0zm0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13zm8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5zM3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8zm10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0zm-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zm9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707zM4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708z"/>
            </svg>
            <svg id="theme-icon-dark-header" width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <path d="M6 .278a.768.768 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278z"/>
            </svg>
          </div>
          <a id="sponsor-btn" class="sponsor-btn" href="https://github.com/sponsors/roman-pinchuk" target="_blank" rel="noopener noreferrer" title="Sponsor this project" aria-label="Sponsor this project">
            <iframe src="https://github.com/sponsors/roman-pinchuk/button" title="Sponsor roman-pinchuk" height="32" width="114" style="border: 0; border-radius: 6px; pointer-events: none;"></iframe>
          </a>
         <div id="save-btn" class="btn btn-primary" title="Save file (Ctrl+S)" aria-label="Save file" aria-disabled="true" tabindex="-1" role="button">
           Save
         </div>
       </div>
     </header>

     <!-- Main Content -->
     <div class="main-container">
       <!-- Sidebar Overlay for Mobile -->
       <div id="sidebar-overlay" class="sidebar-overlay" aria-hidden="true"></div>

       <!-- Sidebar -->
       <aside id="sidebar" class="sidebar" aria-label="File browser">
         <div class="sidebar-header">
           <h2>Files</h2>
         </div>
         <div id="file-list" class="file-list" role="tree" aria-label="YAML files">
           <div class="loading" aria-live="polite">Loading files...</div>
         </div>
       </aside>

        <!-- Editor Container -->
        <main class="editor-container" aria-label="Code editor">
          <div id="editor" class="editor" role="textbox" aria-label="YAML file editor" aria-multiline="true"></div>
          
           <nav class="editor-toolbar" id="editor-toolbar" aria-label="Editor editing tools">
             <div class="toolbar-section">
                <div 
                  id="undo-btn" 
                  class="toolbar-icon-button" 
                  title="Undo changes (Ctrl+Z)" 
                  aria-label="Undo changes"
                  aria-disabled="true"
                  tabindex="-1"
                  role="button">
                 <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                   <path d="M3 7v6h6M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/>
                 </svg>
               </div>
               
                <div 
                  id="redo-btn" 
                  class="toolbar-icon-button" 
                  title="Redo changes (Ctrl+Shift+Z)" 
                  aria-label="Redo changes"
                  aria-disabled="true"
                  tabindex="-1"
                  role="button">
                 <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                   <path d="M21 7v6h-6M3 17a9 9 0 019-9 9 9 0 016 2.3l3 2.7"/>
                 </svg>
               </div>

                <div 
                  id="dedent-btn" 
                  class="toolbar-icon-button" 
                  title="Decrease indentation (Shift+Tab)" 
                  aria-label="Decrease indentation"
                  aria-disabled="false"
                  tabindex="-1"
                  role="button">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M6 5v14"/>
                    <path d="M11 9l-3 3 3 3"/>
                    <path d="M21 12H11"/>
                  </svg>
                </div>

                <div 
                  id="indent-btn" 
                  class="toolbar-icon-button" 
                  title="Increase indentation (Tab)" 
                  aria-label="Increase indentation"
                  aria-disabled="false"
                  tabindex="-1"
                  role="button">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M3 12h10"/>
                    <path d="M13 9l3 3-3 3"/>
                    <path d="M18 5v14"/>
                  </svg>
                </div>
             </div>

             <div class="toolbar-label" id="mobile-filename">No file</div>

             <div class="toolbar-section">
                 <div id="theme-toggle-btn-mobile" class="toolbar-icon-button" title="Change theme" aria-label="Change theme" aria-pressed="false" tabindex="-1" role="button">
                   <svg id="theme-icon-auto" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                     <path d="M21 2H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h7l-2 3v1h8v-1l-2-3h7c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 12H3V4h18v10z"/>
                   </svg>
                   <svg id="theme-icon-light" width="20" height="20" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                     <path d="M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm0 1a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/>
                     <path d="M8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0zm0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13zm8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5zM3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8zm10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0zm-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zm9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707zM4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708z"/>
                   </svg>
                   <svg id="theme-icon-dark" width="20" height="20" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                     <path d="M6 .278a.768.768 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278z"/>
                   </svg>
                 </div>

                 <div id="sponsor-btn-mobile" class="toolbar-icon-button sponsor-btn-mobile" title="Sponsor this project" aria-label="Sponsor this project" tabindex="-1" role="button">
                   <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                     <path d="m8 2.748-.717-.737C5.6.281 2.514.878 1.4 3.053c-.523 1.023-.641 2.5.314 4.385.92 1.815 2.834 3.989 6.286 6.357 3.452-2.368 5.365-4.542 6.286-6.357.955-1.886.838-3.362.314-4.385C13.486.878 10.4.28 8.717 2.01L8 2.748zM8 15C-7.333 4.868 3.279-3.04 7.824 1.143c.06.055.119.112.176.171a3.12 3.12 0 0 1 .176-.17C12.72-3.042 23.333 4.867 8 15z"/>
                   </svg>
                 </div>

                <div id="save-btn-mobile" class="btn btn-primary" title="Save file (Ctrl+S)" aria-label="Save file" aria-disabled="true" tabindex="-1" role="button">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M15,9H5V5H15M12,19A3,3 0 0,1 9,16A3,3 0 0,1 12,13A3,3 0 0,1 15,16A3,3 0 0,1 12,19M17,3H5C3.89,3 3,3.9 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V7L17,3Z" />
                  </svg>
                  <span class="btn-text">Save</span>
                </div>
             </div>
           </nav>

           <section id="validation-details" class="validation-details" aria-live="polite" hidden>
             <div class="validation-details-header">
               <strong id="validation-details-title">Home Assistant validation</strong>
               <div style="display: flex; gap: 10px; align-items: center;">
                 <button id="validation-details-restore" class="btn btn-secondary" style="font-size: 12px; padding: 2px 8px; border-radius: 4px;" type="button" aria-label="Restore last valid state" title="Discard current errors and restore the last valid text">Restore Valid State</button>
                 <button id="validation-details-close" class="validation-details-close" type="button" aria-label="Close validation details">x</button>
               </div>
             </div>
             <pre id="validation-details-content"></pre>
           </section>

           <div id="status-bar" class="status-bar" aria-live="polite" aria-atomic="true">
             <span id="status-message" aria-label="Editor status">Ready</span>
             <span id="status-info" aria-label="Editor info"></span>
           </div>
        </main>
     </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
