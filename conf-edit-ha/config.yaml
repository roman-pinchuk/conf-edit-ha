name: "Configuration Editor"
version: "1.6.0"
slug: "conf-edit-ha"
description: "Lightweight YAML editor with syntax highlighting, entity autocomplete, and Home Assistant config validation"
url: "https://github.com/roman-pinchuk/conf-edit-ha"
image: "ghcr.io/roman-pinchuk/{arch}-conf-edit-ha"
arch:
  - aarch64
  - amd64
init: false
startup: services
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "Web interface"
ingress: true
panel_icon: mdi:file-document-edit
panel_title: "Config Editor"
hassio_api: true
hassio_role: manager
homeassistant_api: true
auth_api: true
map:
  - homeassistant_config:rw
  - ssl:ro
  - addons:ro
  - backup:ro
options:
  theme: "auto"
  indent_style: "spaces"
  indent_opacity: 100
schema:
  theme: list(auto|light|dark)
  indent_style: list(spaces|dotted)
  indent_opacity: int(0,100)
