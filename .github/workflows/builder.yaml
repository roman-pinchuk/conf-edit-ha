name: Builder

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Run Home Assistant Add-on Lint
        uses: frenck/action-addon-linter@v2
        with:
          path: "./conf-edit-ha"

  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build Frontend
        working-directory: ./conf-edit-ha/frontend
        run: |
          npm ci
          npm run build

      - name: Verify Static Assets
        run: |
          if [ ! -d "./conf-edit-ha/static" ]; then
            echo "Error: static directory not found after build"
            exit 1
          fi
