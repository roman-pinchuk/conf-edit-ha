name: Release

on:
  push:
    tags:
      - 'v*'

env:
  ARCHITECTURES: '["amd64", "aarch64"]'
  IMAGE_NAME: conf-edit-ha

jobs:
  init:
    name: Initialize build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      version: ${{ steps.extract_version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: extract_version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "$GITHUB_REF_NAME"^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --oneline --no-merges HEAD)
            PREV_TAG="(initial release)"
          else
            LOG=$(git log --oneline --no-merges "$PREV_TAG"..HEAD)
          fi

          {
            echo "## What's Changed"
            echo ""

            FEATS=$(echo "$LOG" | grep -iE '^\w+\s+feat' || true)
            FIXES=$(echo "$LOG" | grep -iE '^\w+\s+fix' || true)
            CHORES=$(echo "$LOG" | grep -iE '^\w+\s+chore' || true)
            OTHER=$(echo "$LOG" | grep -v -iE '^\w+\s+(feat|fix|chore)' || true)

            if [ -n "$FEATS" ]; then
              echo "### Features"
              echo "$FEATS" | sed 's/^[a-f0-9]*\s*//' | sed 's/^/- /'
              echo ""
            fi

            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES" | sed 's/^[a-f0-9]*\s*//' | sed 's/^/- /'
              echo ""
            fi

            if [ -n "$CHORES" ]; then
              echo "### Maintenance"
              echo "$CHORES" | sed 's/^[a-f0-9]*\s*//' | sed 's/^/- /'
              echo ""
            fi

            if [ -n "$OTHER" ]; then
              echo "### Other"
              echo "$OTHER" | sed 's/^[a-f0-9]*\s*//' | sed 's/^/- /'
            fi
          } > changelog.md

          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## Release Preview

          **Tag:** \`${{ github.ref_name }}\`
          **Version:** \`${{ env.VERSION }}\`
          **Previous tag:** \`$PREV_TAG\`
          **Commits:** $(echo "$LOG" | wc -l | tr -d ' ')

          ### Changelog
          EOF
          cat changelog.md >> $GITHUB_STEP_SUMMARY

      - name: Upload changelog
        uses: actions/upload-artifact@v7
        with:
          name: changelog
          path: changelog.md
          retention-days: 1

      - name: Run Home Assistant Add-on Lint
        uses: frenck/action-addon-linter@v2
        with:
          path: "./conf-edit-ha"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build Frontend
        working-directory: ./conf-edit-ha/frontend
        run: |
          npm ci
          npm run build

      - name: Verify Static Assets
        run: |
          if [ ! -d "./conf-edit-ha/static" ]; then
            echo "Error: static directory not found after build"
            exit 1
          fi

      - name: Upload frontend build
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: conf-edit-ha/static/
          retention-days: 1

      - name: Get build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}

  build:
    name: Build ${{ matrix.arch }} image
    needs: init
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Download frontend build
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: conf-edit-ha/static/

      - name: Set build args per architecture
        run: |
          case "${{ matrix.arch }}" in
            amd64)   BF="ghcr.io/home-assistant/amd64-base-python:3.11-alpine3.18" ;;
            aarch64) BF="ghcr.io/home-assistant/aarch64-base-python:3.11-alpine3.18" ;;
          esac
          echo "BUILD_FROM=$BF" >> $GITHUB_ENV

      - name: Patch config.yaml with release version
        run: |
          sed -i "s/^version:.*/version: \"${GITHUB_REF_NAME#v}\"/" conf-edit-ha/config.yaml
          grep "^version:" conf-edit-ha/config.yaml

      - name: Build and push image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          build-args: |
            BUILD_FROM=${{ env.BUILD_FROM }}
          context: ./conf-edit-ha
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.init.outputs.version }}
            latest
          push: "true"
          version: ${{ needs.init.outputs.version }}

  manifest:
    name: Publish multi-arch manifest
    needs: [init, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ env.IMAGE_NAME }}
          image-tags: |
            ${{ needs.init.outputs.version }}
            latest

  github-release:
    name: Create GitHub Release
    needs: [init, build, manifest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download changelog
        uses: actions/download-artifact@v8
        with:
          name: changelog

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file changelog.md

      - name: Bump version in config.yaml on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          sed -i "s/^version:.*/version: \"${VERSION}\"/" conf-edit-ha/config.yaml
          git add conf-edit-ha/config.yaml
          git commit -m "chore: bump version to ${VERSION} [skip ci]"
          git push origin main

      - name: Release Summary
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "$GITHUB_REF_NAME"^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --oneline --no-merges HEAD)
          else
            LOG=$(git log --oneline --no-merges "$PREV_TAG"..HEAD)
          fi

          cat >> $GITHUB_STEP_SUMMARY <<'EOF'
          ## Release ${{ github.ref_name }}

          ### What was released
          - ✅ Version \`${GITHUB_REF_NAME#v}\` tagged and released
          - ✅ GitHub Release created at [${{ github.ref_name }}](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }})
          - ✅ Multi-arch Docker images built and pushed to \`ghcr.io/${{ github.repository_owner }}\`
            - \`linux/amd64\`
            - \`linux/arm64\`
          - ✅ Frontend bundled and verified
          - ✅ Add-on lint passed

          ### Commits since last release
          EOF
          echo "$LOG" | sed 's/^/    /' >> $GITHUB_STEP_SUMMARY
